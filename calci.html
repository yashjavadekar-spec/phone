<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
/* =========================
   PREMIUM BLACK + GOLD CALCULATOR
========================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(90deg, #0f0f0f, #303030, #646464,#ffffff);
}

/* Calculator Box */
.calculator {
    width: 320px;
    background: #111;
    border-radius: 30px;
    overflow: hidden;
    border: 1px solid rgba(255, 215, 0, 0.15);

    box-shadow:
        0 20px 50px rgba(0,0,0,0.45),
        0 0 25px rgba(255,215,0,0.08);
}

/* Display */
.display {
    height: 160px;
    background: #000;
    padding: 22px;
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
    border-bottom: 1px solid rgba(255,215,0,0.08);
}

/* Screen */
#screen {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    text-align: right;
    font-size: 42px;
    font-weight: 600;
    color: #ffd700;
    font-family: 'Poppins', sans-serif;
}

/* Buttons Area */
.buttons {
    padding: 18px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
}

/* Common Button */
button {
    height: 62px;
    width: 62px;
    border: none;
    border-radius: 18px;
    font-size: 22px;
    cursor: pointer;
    transition: 0.25s;
    font-weight: 600;
}

/* Number Buttons */
.btn {
    background: #1b1b1b;
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.04);
}

/* Operator Buttons */
.operator {
    background: #ffd700;
    color: #111;
    box-shadow: 0 8px 20px rgba(255,215,0,0.2);
}

/* Equal Button */
.equal {
    background: #ff8c00;
    color: white;
    box-shadow: 0 8px 20px rgba(255,140,0,0.2);
}

/* Hover */
button:hover {
    transform: translateY(-3px);
}

/* Click */
button:active {
    transform: scale(0.96);
}


</style>
</head>
<body>

<div class="calculator">

    <div class="display">
        <input type="text" id="text" readonly placeholder="Enter expression">
    </div>

    <div class="buttons">
        <button class="equal" onclick="clearScreen()">C</button>
        <button class="operator" onclick="appendValue('()')">()</button>
        <button class="operator" onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button class="btn" onclick="appendValue('7')">7</button>
        <button class="btn" onclick="appendValue('8')">8</button>
        <button class="btn" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="btn" onclick="appendValue('4')">4</button>
        <button class="btn" onclick="appendValue('5')">5</button>
        <button class="btn" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="btn" onclick="appendValue('1')">1</button>
        <button class="btn" onclick="appendValue('2')">2</button>
        <button class="btn" onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="btn" onclick="plusMinus()">+/-</button>
        <button class="btn" onclick="appendValue('0')">0</button>
        <button class="btn" onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>

</div>

<script>
let screen = document.getElementById("text");

function appendValue(value){
    screen.value += value;
}

function clearScreen(){
    screen.value = "";
}

function calculate(){
    try{
        screen.value = eval(screen.value);
    }
    catch{
        screen.value = "Error";
    }
}

function plusMinus(){
    if(screen.value){
        screen.value = parseFloat(screen.value) * -1;
    }
}
</script>

</body>
</html>
