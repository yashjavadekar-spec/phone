<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera App</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* Make video full screen */
video {
    width: 100vw;
    height: 100vh;
    object-fit: cover; /* IMPORTANT */
}

/* Canvas also full screen */
canvas {
    width: 100vw;
    height: 100vh;
}

/* Center buttons on top */
.controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
}

/* Buttons container spacing */
button {
    margin: 10px;
}

/* Normal Buttons */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #00adb5;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

/* Hover Effect */
button:hover {
    background: #00949b;
    transform: scale(1.05);
}

/* Stop Button (Red) */
button:nth-of-type(3) {
    background: #ff4c4c;
}

button:nth-of-type(3):hover {
    background: #e63b3b;
}
.canvas{
   width: 300px;
    height: 6000px;
}

/* Download Links */
a {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    background: #222;
    color: #00ffd5;
    text-decoration: none;
    transition: 0.3s;
}

a:hover {
    background: #00adb5;
    color: white;
}

/* Recorded Video */
#recordedVideo {
    margin-top: 15px;
    width: 320px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* Divider */
hr {
    margin: 25px auto;
    width: 60%;
    border: 1px solid #444;
}

/* OPTIONAL: Triangle Play Button */
.play-btn {
    width: 0;
    height: 0;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    border-left: 30px solid #00adb5;
    background: none;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

.play-btn:hover {
    transform: scale(1.2);
}
</style>

</head>
<body>
<div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div class="controls">
    <button onclick="capturePhoto()">📸 Capture</button>
    
<a id="downloadPhoto" download="photo.png"> click here to Download Photo</a>
<hr>
<button onclick="startRecording()">▶ Start</button>
<button onclick="stopRecording()">⏹ Stop</button>

<!-- Download Button -->
<a id="downloadLink" download="video.webm">⬇ Download Video</a>


<script>
let video = document.getElementById("video");

// Access camera
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
    video.srcObject = stream;
    window.stream = stream;
});

// 📸 Capture Photo
function capturePhoto() {
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let imageURL = canvas.toDataURL("image/png");

    let link = document.getElementById("downloadPhoto");
    link.href = imageURL;
    link.innerText = "⬇ Click to Download Photo";
}

navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
    video.srcObject = stream;
    window.stream = stream;
});

let mediaRecorder;
let chunks = [];

function startRecording() {
    chunks = [];
    mediaRecorder = new MediaRecorder(window.stream);

    mediaRecorder.ondataavailable = e => {
        chunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
        let blob = new Blob(chunks, { type: "video/webm" });
        let videoURL = URL.createObjectURL(blob);

        let link = document.getElementById("downloadLink");
        link.href = videoURL;
        link.style.display = "inline-block"; // show button
    };

    mediaRecorder.start();
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }
}

</script>

</body>
</html>
