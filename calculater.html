<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iPhone Calculator</title>

<style>
body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.calculator {
    width: 320px;
    background: #000;
    border-radius: 40px;
    padding: 20px;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
}

.display {
    color: white;
    font-size: 60px;
    text-align: right;
    padding: 20px 10px;
    overflow-x: auto;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

button {
    height: 70px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    cursor: pointer;
    transition: 0.15s;
}

button:active {
    transform: scale(0.95);
}

/* Colors */
.btn-dark {
    background: #333;
    color: white;
}

.btn-light {
    background: #a5a5a5;
    color: black;
}

.btn-orange {
    background: #ff9500;
    color: white;
}

.zero {
    grid-column: span 2;
    border-radius: 40px;
    text-align: left;
    padding-left: 25px;
}
</style>
</head>

<body>

<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="btn-light" onclick="clearDisplay()">AC</button>
        <button class="btn-light" onclick="append('%')">%</button>
        <button class="btn-light" onclick="append('/')">÷</button>
        <button class="btn-orange" onclick="append('*')">×</button>

        <button class="btn-dark" onclick="append('7')">7</button>
        <button class="btn-dark" onclick="append('8')">8</button>
        <button class="btn-dark" onclick="append('9')">9</button>
        <button class="btn-orange" onclick="append('-')">−</button>

        <button class="btn-dark" onclick="append('4')">4</button>
        <button class="btn-dark" onclick="append('5')">5</button>
        <button class="btn-dark" onclick="append('6')">6</button>
        <button class="btn-orange" onclick="append('+')">+</button>

        <button class="btn-dark" onclick="append('1')">1</button>
        <button class="btn-dark" onclick="append('2')">2</button>
        <button class="btn-dark" onclick="append('3')">3</button>
        <button class="btn-orange" onclick="calculate()">=</button>

        <button class="btn-dark zero" onclick="append('0')">0</button>
        <button class="btn-dark" onclick="append('.')">.</button>
    </div>
</div>
